[assets]
directory = "public"
not_found_handling = "single-page-application"

[[kv_namespaces]]
binding = "HYCU_KV"
id = "7c5384c1ab3547aca7d3b29ebedc68c9"

[vars]
HYCU_USER_ID = "2024112536"

# Secrets (set via CLI):

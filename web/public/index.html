<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HYCU 출석 관리</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --card: #141414;
      --border: #222222;
      --text-main: #f5f5f5;
      --text-muted: #a3a3a3;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --success: #22c55e;
      --warning: #eab308;
      --error: #ef4444;
      --font: system-ui, -apple-system, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background-color: var(--bg);
      color: var(--text-main);
      line-height: 1.5;
      padding: 1.5rem;
      -webkit-font-smoothing: antialiased;
    }
    .container { max-width: 1000px; margin: 0 auto; }
    
    /* Header */
    header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem;
    }
    h1 { font-size: 1.5rem; font-weight: 600; display: flex; align-items: center; gap: 0.5rem; letter-spacing: -0.02em; }
    .header-actions { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
    .last-sync { color: var(--text-muted); font-size: 0.875rem; margin-right: 0.5rem; }
    
    /* Buttons */
    button {
      background: var(--card); border: 1px solid var(--border);
      color: var(--text-main); padding: 0.5rem 1rem; border-radius: 6px;
      cursor: pointer; font-size: 0.875rem; font-weight: 500;
      transition: all 0.2s ease; display: inline-flex; align-items: center; justify-content: center; gap: 0.35rem;
    }
    button:hover:not(:disabled) { background: #1e1e1e; border-color: #333; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .primary-btn { background: var(--accent); border-color: var(--accent); color: #fff; }
    .primary-btn:hover:not(:disabled) { background: var(--accent-hover); border-color: var(--accent-hover); }
    
    .danger-btn { background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.2); color: var(--error); }
    .danger-btn:hover:not(:disabled) { background: rgba(239, 68, 68, 0.2); }
    
    .icon-btn { padding: 0.5rem; border-radius: 6px; background: transparent; border-color: transparent; color: var(--text-muted); }
    .icon-btn:hover:not(:disabled) { background: rgba(255,255,255,0.05); color: var(--text-main); }

    /* Layout Grids */
    .grid { display: grid; gap: 1rem; margin-bottom: 2rem; }
    .grid-3 { grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); }
    .grid-2 { grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
    
    /* Cards */
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; padding: 1.25rem;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: #333; }
    .card-label { color: var(--text-muted); font-size: 0.875rem; margin-bottom: 0.5rem; }
    .card-value { font-size: 1.75rem; font-weight: 600; letter-spacing: -0.02em; }
    
    section { margin-bottom: 2rem; }
    h2 { font-size: 1.125rem; font-weight: 600; margin-bottom: 1rem; color: #e5e5e5; }

    /* Session Management */
    .session-section {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; margin-bottom: 2rem; overflow: hidden;
    }
    .session-header {
      padding: 1.25rem; display: flex; justify-content: space-between; align-items: center;
      cursor: pointer; user-select: none; transition: background 0.2s;
    }
    .session-header:hover { background: rgba(255,255,255,0.02); }
    .session-status { display: flex; align-items: center; font-size: 0.95rem; font-weight: 500; }
    .session-toggle-icon { color: var(--text-muted); font-size: 0.875rem; display: flex; align-items: center; gap: 0.5rem; }
    .chevron { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .session-section.open .chevron { transform: rotate(180deg); }
    
    .session-panel {
      padding: 0 1.25rem 1.25rem 1.25rem; border-top: 1px solid var(--border);
      display: none; animation: fadeIn 0.3s ease;
    }
    .session-section.open .session-panel { display: block; }
    .panel-actions { display: flex; justify-content: flex-end; gap: 0.75rem; margin-top: 1rem; }

    /* Table */
    .card-table {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; overflow: hidden;
    }
    .table-responsive { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 1rem 1.25rem; text-align: left; border-bottom: 1px solid var(--border); }
    th { color: var(--text-muted); font-weight: 500; font-size: 0.875rem; background: rgba(255,255,255,0.02); }
    tr:last-child td { border-bottom: none; }
    
    /* Progress Bars */
    .progress-wrapper { display: flex; align-items: center; gap: 1rem; min-width: 150px; }
    .progress-bar {
      flex-grow: 1; height: 6px; background: var(--border);
      border-radius: 3px; overflow: hidden; position: relative;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #3b82f6, #60a5fa);
      border-radius: 3px; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .progress-fill.success { background: linear-gradient(90deg, #22c55e, #4ade80); }
    
    /* Badges */
    .badge {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 0.25rem 0.6rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 500;
      white-space: nowrap; letter-spacing: 0.02em;
    }
    .badge.완료 { background: rgba(34, 197, 94, 0.1); color: var(--success); border: 1px solid rgba(34, 197, 94, 0.2); }
    .badge.진행중 { background: rgba(59, 130, 246, 0.1); color: var(--accent); border: 1px solid rgba(59, 130, 246, 0.2); }
    .badge.미시작 { background: rgba(163, 163, 163, 0.1); color: var(--text-muted); border: 1px solid rgba(163, 163, 163, 0.2); }

    /* Events */
    .events { display: flex; flex-direction: column; gap: 0.75rem; }
    .event { 
      display: flex; gap: 1rem; align-items: flex-start;
      padding: 1rem 1.25rem; background: var(--card); border: 1px solid var(--border); border-radius: 8px;
      transition: border-color 0.2s;
    }
    .event:hover { border-color: #333; }
    .event-time { color: var(--text-muted); font-size: 0.875rem; min-width: 80px; margin-top: 0.1rem; }
    .event-main { flex-grow: 1; }
    .event-msg { color: var(--text-main); font-size: 0.95rem; margin-top: 0.35rem; }
    .event-badge { 
      font-size: 0.7rem; padding: 0.15rem 0.4rem; border-radius: 4px; 
      text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600;
    }
    .event.success .event-badge { background: rgba(34, 197, 94, 0.1); color: var(--success); }
    .event.fail .event-badge { background: rgba(239, 68, 68, 0.1); color: var(--error); }

    /* Forms & Inputs */
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.875rem; color: var(--text-muted); margin-bottom: 0.5rem; font-weight: 500; }
    .form-group input, .form-group textarea {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      color: var(--text-main); padding: 0.75rem; border-radius: 6px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 0.875rem; 
      transition: all 0.2s; resize: vertical;
    }
    .form-group input:focus, .form-group textarea:focus {
      outline: none; border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent);
    }
    .form-group input[type="password"] { font-family: inherit; }

    /* Modals */
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.2s ease;
    }
    .modal-overlay.active { opacity: 1; pointer-events: auto; }
    .modal-content {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 1.5rem; width: 100%; max-width: 400px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
      transform: translateY(10px) scale(0.98); transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .modal-overlay.active .modal-content { transform: translateY(0) scale(1); }
    .modal-content h3 { margin-bottom: 1.25rem; font-size: 1.125rem; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 0.75rem; margin-top: 1.5rem; }

    /* Toasts */
    .toast-container {
      position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 200;
      display: flex; flex-direction: column; gap: 0.5rem; pointer-events: none;
    }
    .toast {
      background: var(--card); border: 1px solid var(--border);
      padding: 1rem 1.25rem; border-radius: 8px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5);
      font-size: 0.875rem; font-weight: 500;
      display: flex; align-items: center; gap: 0.75rem;
      animation: slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      pointer-events: auto;
    }
    .toast-success { border-left: 4px solid var(--success); }
    .toast-error { border-left: 4px solid var(--error); }
    .toast-info { border-left: 4px solid var(--accent); }

    /* Utilities */
    .skeleton {
      background: linear-gradient(90deg, #141414 25%, #1e1e1e 50%, #141414 75%);
      background-size: 200% 100%;
      animation: loading 1.5s infinite;
      border-radius: 4px;
    }
    @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    @keyframes slideIn { from { opacity: 0; transform: translateX(20px) scale(0.95); } to { opacity: 1; transform: translateX(0) scale(1); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .sk-text { height: 1rem; width: 60%; margin-bottom: 0.5rem; }
    .sk-title { height: 1.5rem; width: 30%; }
    .sk-card { height: 100px; border-radius: 8px; }
    .sk-row { height: 3rem; margin-bottom: 0.5rem; border-radius: 4px; }

    .empty-state {
      text-align: center; padding: 4rem 1rem;
      background: var(--card); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text-muted);
    }
    .hidden { display: none !important; }
    
    .status-dot {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      background-color: gray; margin-right: 8px; flex-shrink: 0;
      transition: background-color 0.3s, box-shadow 0.3s;
    }
    .status-dot.active { background-color: var(--success); box-shadow: 0 0 8px var(--success); }
    .status-dot.expired { background-color: var(--error); box-shadow: 0 0 8px var(--error); }

    .spinner {
      animation: spin 1s linear infinite; display: inline-block;
      width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%; border-top-color: #fff;
    }

    @media (max-width: 768px) {
      th, td { white-space: nowrap; padding: 0.75rem 1rem; }
      .event { flex-direction: column; gap: 0.5rem; }
      .header-actions { width: 100%; justify-content: flex-end; }
      #run-attend-btn { flex-grow: 1; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1><span class="status-dot" id="header-status-dot"></span>HYCU 출석 관리</h1>
      <div class="header-actions">
        <span class="last-sync" id="last-sync-time"></span>
        <button id="run-attend-btn" class="primary-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
          출석 실행
        </button>
        <button id="refresh-btn">새로고침</button>
        <button id="settings-btn" class="icon-btn" title="API 설정">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </button>
      </div>
    </header>

    <!-- Session Management Section -->
    <section id="session-section" class="session-section">
      <div class="session-header" id="session-toggle-btn">
        <div class="session-status">
          <span class="status-dot" id="session-status-dot"></span>
          세션 상태: <span id="session-status-text" style="margin-left: 6px; color: var(--text-muted)">확인 중...</span>
          <span id="session-saved-time" style="margin-left: 8px; font-size: 0.8rem; color: var(--text-muted); font-weight: 400;"></span>
        </div>
        <div class="session-toggle-icon">
          <span>쿠키 수동 등록</span>
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="chevron"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </div>
      </div>
      <div id="session-panel" class="session-panel">
        <div class="form-group">
          <label>road.hycu.ac.kr 쿠키</label>
          <textarea id="road-cookies" rows="2" placeholder="JSESSIONID=...; WMONID=..."></textarea>
        </div>
        <div class="form-group">
          <label>lms.hycu.ac.kr 쿠키</label>
          <textarea id="lms-cookies" rows="2" placeholder="JSESSIONID=...; WMONID=..."></textarea>
        </div>
        <div class="panel-actions">
          <button id="delete-session-btn" class="danger-btn">세션 삭제</button>
          <button id="save-session-btn" class="primary-btn">세션 저장</button>
        </div>
      </div>
    </section>

    <!-- Loading Skeleton -->
    <div id="skeleton">
      <div class="grid grid-3">
        <div class="skeleton sk-card"></div>
        <div class="skeleton sk-card"></div>
        <div class="skeleton sk-card"></div>
      </div>
      <div class="grid grid-2">
        <div class="skeleton sk-card"></div>
        <div class="skeleton sk-card"></div>
      </div>
      <div class="skeleton sk-row" style="height: 200px"></div>
    </div>

    <!-- Empty State -->
    <div id="empty-state" class="empty-state hidden">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 1rem; opacity: 0.5">
        <ellipse cx="12" cy="5" rx="9" ry="3"></ellipse>
        <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path>
        <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path>
      </svg>
      <p>데이터가 없습니다. 출석을 실행하거나 서버에서 동기화를 진행하세요.</p>
    </div>

    <!-- Dashboard Content -->
    <div id="dashboard" class="hidden">
      <section>
        <h2>요약 통계</h2>
        <div class="grid grid-3">
          <div class="card">
            <div class="card-label">전체 과목 수</div>
            <div class="card-value" id="stat-total-courses">-</div>
          </div>
          <div class="card">
            <div class="card-label">완료 과목</div>
            <div class="card-value" id="stat-completed-courses">-</div>
          </div>
          <div class="card">
            <div class="card-label">전체 진도율</div>
            <div class="card-value" id="stat-overall-progress">-</div>
          </div>
        </div>
        
        <div class="grid grid-2">
          <div class="card">
            <div class="card-label">마지막 로그인</div>
            <div class="card-value" id="stat-last-login" style="font-size: 1.25rem">-</div>
          </div>
          <div class="card">
            <div class="card-label">마지막 출석</div>
            <div class="card-value" id="stat-last-attend" style="font-size: 1.25rem">-</div>
          </div>
        </div>
      </section>

      <section>
        <h2>과목별 진도 현황</h2>
        <div class="card-table">
          <div class="table-responsive">
            <table>
              <thead>
                <tr>
                  <th>과목명</th>
                  <th>진도율</th>
                  <th>출석 / 전체</th>
                  <th>상태</th>
                </tr>
              </thead>
              <tbody id="courses-tbody">
                <!-- Populated by JS -->
              </tbody>
            </table>
          </div>
        </div>
      </section>

      <section>
        <h2>최근 이벤트 로그</h2>
        <div id="events-container" class="events">
          <!-- Populated by JS -->
        </div>
      </section>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal" class="modal-overlay">
    <div class="modal-content">
      <h3>API 설정</h3>
      <div class="form-group">
        <label for="api-key-input">API Key (Authorization Bearer)</label>
        <input type="password" id="api-key-input" placeholder="Enter API Key">
        <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 0.5rem;">
          이 키는 로컬 브라우저에만 저장되며 세션 관리 및 출석 실행에 사용됩니다.
        </p>
      </div>
      <div class="modal-actions">
        <button id="close-settings-btn">취소</button>
        <button id="save-settings-btn" class="primary-btn">저장</button>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <script>
    /* Utility Functions */
    const relativeTime = (dateStr) => {
      if (!dateStr) return '기록 없음';
      const diff = Date.now() - new Date(dateStr).getTime();
      if (diff < 0) return '방금';
      
      const min = Math.floor(diff / 60000);
      if (min < 1) return '방금';
      if (min < 60) return `${min}분 전`;
      
      const hr = Math.floor(min / 60);
      if (hr < 24) return `${hr}시간 전`;
      
      const d = Math.floor(hr / 24);
      return `${d}일 전`;
    };

    const formatRatio = (ratio) => (ratio || 0).toFixed(1);

    const showToast = (message, type = 'info') => {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      
      let icon = '';
      if (type === 'success') icon = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>';
      else if (type === 'error') icon = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--error)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>';
      else icon = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>';
      
      toast.innerHTML = `${icon} <span>${message}</span>`;
      container.appendChild(toast);
      
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(10px) scale(0.95)';
        setTimeout(() => toast.remove(), 300);
      }, 4000);
    };

    /* API Auth Configuration */
    const getApiKey = () => localStorage.getItem('hycu-api-key') || '';
    const setApiKey = (key) => localStorage.setItem('hycu-api-key', key);

    const fetchWithAuth = async (url, options = {}) => {
      const apiKey = getApiKey();
      const headers = { ...options.headers };
      if (apiKey) {
        headers['Authorization'] = `Bearer ${apiKey}`;
      }
      return fetch(url, { ...options, headers });
    };

    /* Session Management */
    const checkSession = async () => {
      const dot1 = document.getElementById('header-status-dot');
      const dot2 = document.getElementById('session-status-dot');
      const text = document.getElementById('session-status-text');
      const savedTime = document.getElementById('session-saved-time');

      try {
        const res = await fetch('/api/session');
        if (!res.ok) throw new Error('Network error');
        const data = await res.json();
        
        dot1.className = 'status-dot';
        dot2.className = 'status-dot';
        
        if (data.valid) {
          dot1.classList.add('active');
          dot2.classList.add('active');
          text.textContent = '세션 활성';
          text.style.color = 'var(--success)';
        } else {
          dot1.classList.add('expired');
          dot2.classList.add('expired');
          text.textContent = '세션 만료';
          text.style.color = 'var(--error)';
        }
        
        if (data.savedAt) {
          savedTime.textContent = `(저장: ${relativeTime(data.savedAt)})`;
        } else {
          savedTime.textContent = '';
        }
      } catch (err) {
        dot1.className = 'status-dot';
        dot2.className = 'status-dot';
        text.textContent = '상태 알 수 없음';
        text.style.color = 'var(--text-muted)';
        savedTime.textContent = '';
      }
    };

    document.getElementById('session-toggle-btn').addEventListener('click', () => {
      document.getElementById('session-section').classList.toggle('open');
    });

    document.getElementById('save-session-btn').addEventListener('click', async () => {
      if (!getApiKey()) {
        showToast('API Key가 설정되지 않았습니다.', 'error');
        document.getElementById('settings-modal').classList.add('active');
        return;
      }
      
      const roadCookies = document.getElementById('road-cookies').value.trim();
      const lmsCookies = document.getElementById('lms-cookies').value.trim();
      
      if (!roadCookies && !lmsCookies) {
        showToast('최소 하나의 쿠키를 입력해주세요.', 'warning');
        return;
      }
      
      const btn = document.getElementById('save-session-btn');
      const originalText = btn.textContent;
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> 저장 중...';
      
      try {
        const res = await fetchWithAuth('/api/session', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ roadCookies, lmsCookies })
        });
        
        if (res.status === 401 || res.status === 403) {
          showToast('인증 실패: 유효하지 않은 API Key', 'error');
          return;
        }
        
        const data = await res.json();
        if (data.success) {
          showToast('세션 쿠키가 저장되었습니다.', 'success');
          document.getElementById('road-cookies').value = '';
          document.getElementById('lms-cookies').value = '';
          document.getElementById('session-section').classList.remove('open');
          checkSession();
        } else {
          showToast(`세션 저장 실패: ${data.message || '알 수 없는 오류'}`, 'error');
        }
      } catch (err) {
        showToast('저장 중 통신 오류가 발생했습니다.', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = originalText;
      }
    });

    document.getElementById('delete-session-btn').addEventListener('click', async () => {
      if (!getApiKey()) {
        showToast('API Key가 설정되지 않았습니다.', 'error');
        return;
      }
      if (!confirm('정말 저장된 세션을 삭제하시겠습니까?')) return;
      
      const btn = document.getElementById('delete-session-btn');
      btn.disabled = true;
      
      try {
        const res = await fetchWithAuth('/api/session', { method: 'DELETE' });
        if (res.ok) {
          showToast('세션이 삭제되었습니다.', 'success');
          checkSession();
        } else if (res.status === 401 || res.status === 403) {
          showToast('인증 실패: 유효하지 않은 API Key', 'error');
        } else {
          showToast('세션 삭제 실패', 'error');
        }
      } catch (err) {
        showToast('삭제 중 오류가 발생했습니다.', 'error');
      } finally {
        btn.disabled = false;
      }
    });

    /* Attendance Execution */
    document.getElementById('run-attend-btn').addEventListener('click', async () => {
      if (!getApiKey()) {
        showToast('API Key가 설정되지 않았습니다.', 'error');
        document.getElementById('settings-modal').classList.add('active');
        return;
      }
      
      const btn = document.getElementById('run-attend-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> 출석 실행 중...';
      
      try {
        const res = await fetchWithAuth('/api/attend', { method: 'POST' });
        if (res.status === 401 || res.status === 403) {
          showToast('인증 실패: 유효하지 않은 API Key', 'error');
          return;
        }
        
        const data = await res.json();
        if (data.success) {
          const { attended, failed, total } = data.summary || {};
          showToast(`출석 완료! 성공 ${attended || 0}건, 실패 ${failed || 0}건`, 'success');
          fetchStatus();
          checkSession();
        } else {
          showToast(`출석 실행 완료 (일부 오류): ${data.message || '알 수 없는 오류'}`, 'warning');
          fetchStatus();
          checkSession();
        }
      } catch (err) {
        showToast('출석 요청 중 통신 오류가 발생했습니다.', 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg> 출석 실행';
      }
    });

    /* Settings Modal */
    document.getElementById('settings-btn').addEventListener('click', () => {
      const input = document.getElementById('api-key-input');
      const key = getApiKey();
      input.value = key ? key : '';
      document.getElementById('settings-modal').classList.add('active');
      input.focus();
    });

    document.getElementById('close-settings-btn').addEventListener('click', () => {
      document.getElementById('settings-modal').classList.remove('active');
    });

    document.getElementById('save-settings-btn').addEventListener('click', () => {
      const key = document.getElementById('api-key-input').value.trim();
      setApiKey(key);
      document.getElementById('settings-modal').classList.remove('active');
      showToast('API Key가 저장되었습니다.', 'success');
    });

    /* Dashboard Data Rendering */
    const renderDashboard = (data) => {
      document.getElementById('skeleton').classList.add('hidden');
      
      if (!data || !data.state || !data.state.courses || data.state.courses.length === 0) {
        document.getElementById('empty-state').classList.remove('hidden');
        document.getElementById('dashboard').classList.add('hidden');
        return;
      }
      
      document.getElementById('empty-state').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');

      const { state, events } = data;
      
      document.getElementById('last-sync-time').textContent = `최근 동기화: ${relativeTime(state.lastSync)}`;
      
      // Stats
      document.getElementById('stat-total-courses').textContent = `${state.stats?.totalCourses || 0}개`;
      document.getElementById('stat-completed-courses').textContent = `${state.stats?.completedCourses || 0}개`;
      document.getElementById('stat-overall-progress').textContent = `${formatRatio(state.stats?.overallProgress || 0)}%`;
      
      document.getElementById('stat-last-login').textContent = relativeTime(state.lastLogin);
      document.getElementById('stat-last-attend').textContent = relativeTime(state.lastAttend);
      
      // Courses
      const tbody = document.getElementById('courses-tbody');
      tbody.innerHTML = '';
      
      const courses = state.courses || [];
      courses.forEach(c => {
        const isCompleted = c.progressRatio >= 100;
        const isStarted = c.progressRatio > 0;
        const statusText = isCompleted ? '완료' : (isStarted ? '진행중' : '미시작');
        
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td style="font-weight: 500">${c.name}</td>
          <td>
            <div class="progress-wrapper">
              <div style="min-width: 45px; font-variant-numeric: tabular-nums; font-size: 0.875rem">${formatRatio(c.progressRatio)}%</div>
              <div class="progress-bar">
                <div class="progress-fill ${isCompleted ? 'success' : ''}" style="width: ${Math.min(c.progressRatio, 100)}%"></div>
              </div>
            </div>
          </td>
          <td style="font-variant-numeric: tabular-nums; color: var(--text-muted); font-size: 0.875rem">${c.attendCount || 0} / ${c.totalCount || 0}</td>
          <td><span class="badge ${statusText}">${statusText}</span></td>
        `;
        tbody.appendChild(tr);
      });
      
      // Events
      const eventsContainer = document.getElementById('events-container');
      eventsContainer.innerHTML = '';
      
      if (events && events.length > 0) {
        events.forEach(e => {
          const el = document.createElement('div');
          el.className = `event ${e.success ? 'success' : 'fail'}`;
          el.innerHTML = `
            <div class="event-time">${relativeTime(e.timestamp)}</div>
            <div class="event-main">
              <span class="event-badge">${e.action}</span>
              <div class="event-msg">${e.message}</div>
            </div>
          `;
          eventsContainer.appendChild(el);
        });
      } else {
        eventsContainer.innerHTML = '<div style="color: var(--text-muted); text-align: center; padding: 2rem; border: 1px dashed var(--border); border-radius: 8px;">최근 이벤트가 없습니다.</div>';
      }
    };

    const fetchStatus = async () => {
      try {
        const res = await fetch('/api/status');
        if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
        const data = await res.json();
        renderDashboard(data);
        document.getElementById('last-sync-time').style.color = 'var(--text-muted)';
      } catch (err) {
        console.error('Failed to fetch status:', err);
        const dashboard = document.getElementById('dashboard');
        
        if (dashboard.classList.contains('hidden')) {
          document.getElementById('skeleton').classList.add('hidden');
          const emptyState = document.getElementById('empty-state');
          emptyState.querySelector('p').textContent = '데이터를 불러올 수 없습니다. 서버 연결을 확인하세요.';
          emptyState.classList.remove('hidden');
        } else {
          document.getElementById('last-sync-time').textContent = '동기화 실패 (오프라인)';
          document.getElementById('last-sync-time').style.color = 'var(--error)';
        }
      }
    };

    let autoRefreshInterval;
    const startAutoRefresh = () => {
      if (autoRefreshInterval) clearInterval(autoRefreshInterval);
      autoRefreshInterval = setInterval(() => {
        fetchStatus();
        checkSession();
      }, 60000);
    };

    document.getElementById('refresh-btn').addEventListener('click', () => {
      const btn = document.getElementById('refresh-btn');
      const originalText = btn.textContent;
      btn.innerHTML = '<span class="spinner" style="width:12px; height:12px; border-width: 1.5px;"></span> 동기화 중';
      btn.disabled = true;
      
      Promise.all([fetchStatus(), checkSession()]).finally(() => {
        setTimeout(() => {
          btn.textContent = originalText;
          btn.disabled = false;
        }, 500);
      });
      
      startAutoRefresh();
    });

    // Close modal on escape
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        document.getElementById('settings-modal').classList.remove('active');
      }
    });

    // Initialize
    fetchStatus();
    checkSession();
    startAutoRefresh();
  </script>
</body>
</html>

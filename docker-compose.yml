services:
  # One-shot: manual commands (login, api-attend, status)
  cli:
    image: ghcr.io/qws941/hycu:latest
    profiles: ["cli"]
    env_file: .env
    volumes:
      - ./cookies:/app/cookies
    environment:
      TZ: Asia/Seoul
    # Usage:
    #   docker compose run --rm cli login
    #   docker compose run --rm cli api-attend
    #   docker compose run --rm cli status

  # HTTP service: exposes attendance operations for n8n / external orchestrators
  server:
    image: ghcr.io/qws941/hycu:latest
    container_name: hycu-server
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./cookies:/app/cookies
    environment:
      TZ: Asia/Seoul
    entrypoint: ["npx", "tsx", "src/index.ts", "server"]
    ports:
      - "8080:8080"
    labels:
      - com.centurylinklabs.watchtower.scope=hycu

  # Auto-update: pulls new images and restarts containers
  watchtower:
    image: containrrr/watchtower
    container_name: hycu-watchtower
    restart: unless-stopped
    environment:
      TZ: Asia/Seoul
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_POLL_INTERVAL: "300"
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_SCOPE: hycu
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      - com.centurylinklabs.watchtower.scope=hycu

name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - '*.md'
      - 'data/**'
  pull_request:
    branches: [master]
    paths-ignore:
      - '*.md'
      - 'data/**'
  workflow_dispatch:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version-file: .node-version
          cache: npm

      - run: npm ci
      - run: npx tsc --noEmit

  build-and-push:
    needs: typecheck
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: docker/setup-buildx-action@6524bf65af31da8d45b59e8c27de4bd072b392f5 # v3.8.0

      - uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4 # v6.15.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: production-nas
    steps:
      - uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ vars.NAS_HOST }}
          username: ${{ vars.NAS_USER }}
          password: ${{ secrets.NAS_SSH_PASSWORD }}
          script: |
            cd ${{ vars.NAS_PROJECT_DIR }}
            ${{ vars.NAS_DOCKER_BIN }} compose pull
            ${{ vars.NAS_DOCKER_BIN }} compose up -d --remove-orphans
            sleep 5
            ${{ vars.NAS_DOCKER_BIN }} ps --filter name=hycu-scheduler --format '{{.Status}}' | grep -q 'Up' \
              && echo '✅ Deploy OK: hycu-scheduler running' \
              || (echo '❌ Deploy FAILED: hycu-scheduler not running' && exit 1)
